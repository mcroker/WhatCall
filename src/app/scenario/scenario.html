<main class="main">

  <h2>Scenario</h2>
  <h3>{{ scenario?.title }}</h3>

  <app-video-player #player [source]="scenario?.url"></app-video-player>

  @if (scenario?.myResponse !== undefined) {
   <p>You selected {{ scenario?.myResponse?.latestResponse }}</p>
   <app-responses-chart [scenarioStats]="scenario?.stats"></app-responses-chart>
  }
<app-user-response #response [options]="scenario?.options" (selection)="selectionMade($event)"></app-user-response>
<button mat-raised-button color="primary" (click)="loadScenario()">Random Scenario</button>
</main>
